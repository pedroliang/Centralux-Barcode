# ============================================
# Centralux Barcode — Deploy para GitHub Pages
# Faz deploy automático a cada push na branch main
# ============================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Substituir variáveis de ambiente
        run: |
          # Substituir placeholders pelas variáveis de ambiente
          if [ -n "${{ vars.SUPABASE_URL }}" ]; then
            sed -i "s|%%SUPABASE_URL%%|${{ vars.SUPABASE_URL }}|g" supabase.js
          fi
          if [ -n "${{ vars.SUPABASE_ANON_KEY }}" ]; then
            sed -i "s|%%SUPABASE_ANON_KEY%%|${{ vars.SUPABASE_ANON_KEY }}|g" supabase.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
